<html>
<head>
<title>battle!</title>
<meta charset="UTF-8">
<link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
<div class="ship">
	<div id="nameviewer">---</div>
	<div id="laserviewer">---</div>
	<div id="shieldsviewer">---</div>
	<div id="missileviewer">---</div>
	<div id="creditviewer">---</div>
	<div id=input>
		<button onclick=fireLaser()><b>FIRE LASERS</b><br><small>does random damage up to x</small></button>
		<button onclick=fireMissile()><b>FIRE MISSILE</b><br><small>does fixed damage and destroys enemys lasers</small></button>
		<button onclick=raiseShields()><b>REGENERATE SHIELDS</b><br><small>the less you have, the more it regenerates</small></button>
		<button onclick=scan()><b>SCAN</b><br><small>displays info about the enemy</small></button>
		<button onclick=retreat()><b>RETREAT</b><br><small>when everything goes to shit, enemy gets one more shot at you before you go.</small></button>
	</div>
</div>
<div class="mainWindow">
	<div class="outputWindow">
		<p id="output"></p>
	</div>
</div>
<script
  src="https://code.jquery.com/jquery-3.2.1.min.js"
  integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
  crossorigin="anonymous"></script>
<script type="text/javascript" src="base.js"></script>
<script type="text/javascript" src="base_battle.js"></script>
<script>
	generateEnemy();
	output("You are ambushed by " + enemy.n + "!");
	scan();
	output("");
	output("A message is recieved on the intercom: " + enemy.h);
	output("");
	output("COMBAT MODE : ENGAGED");
</script>
</body>
</html>
